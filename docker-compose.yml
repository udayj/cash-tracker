version: '3.8'

services:
  cash-tracker:
    image: ghcr.io/udayj/cash-tracker:latest
    container_name: cash-tracker
    restart: unless-stopped
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "cash-tracker"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
